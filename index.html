<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>vp-recorder — Record professional presentations in your browser</title>
    <link rel="icon" type="image/svg+xml" href="/logo.svg" />
    <link rel="manifest" href="/manifest.json" />
    <link rel="apple-touch-icon" href="/apple-touch-icon.png" />

    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="theme-color" content="rgba(0, 0, 0, 0.87)" />
    <meta name="description" content="Record screen + camera in the browser with a floating teleprompter, virtual background, and smart face tracking. Fully local — your video never leaves the browser." />
    <meta name="keywords" content="recorder, screen recorder, teleprompter, virtual background, face tracking, picture-in-picture, browser, MP4" />

    <meta http-equiv="Cross-Origin-Opener-Policy" content="same-origin" />
    <meta http-equiv="Cross-Origin-Embedder-Policy" content="require-corp" />

    <!-- Open Graph / Facebook -->
    <meta property="og:type" content="website" />
    <meta property="og:title" content="vp-recorder" />
    <meta property="og:description" content="Record professional presentations in your browser — screen, camera, teleprompter, and virtual background, all fully local." />
    <meta property="og:image" content="/meta.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:title" content="vp-recorder" />
    <meta property="twitter:description" content="Record professional presentations in your browser — screen, camera, teleprompter, and virtual background, all fully local." />
    <meta property="twitter:image" content="/meta.jpg" />

    <style>
      /* Reserve scrollbar gutter so transient vertical scrollbars (e.g. from a
         tooltip portal briefly overflowing the body) can't change the
         viewport width and cause the layout to oscillate horizontally. */
      html { scrollbar-gutter: stable; }
    </style>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
